name: Reusable Cherry Pick to PR

on:
  workflow_call:
    inputs:
      commit_sha:
        required: true
        type: string
      target_branch:
        required: true
        type: string

jobs:
  cherry-pick-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration de Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Création de la branche et Cherry-pick
        id: cp
        run: |
          SHORT_SHA=$(echo "${{ inputs.commit_sha }}" | cut -c1-7)
          
          # SOLUTION AU PROBLEME : On ajoute le run_id. Si tu relances le job, le run_id reste le même,
          # mais on va faire un push --force pour écraser proprement l'ancienne tentative.
          NEW_BRANCH="cherry-pick-${SHORT_SHA}-to-${{ inputs.target_branch }}-${{ github.run_id }}"
          echo "branch_name=$NEW_BRANCH" >> $GITHUB_OUTPUT

          # Se placer sur la branche cible et créer la branche de travail
          git checkout ${{ inputs.target_branch }}
          git checkout -b $NEW_BRANCH

          # IMPORTANT (-m 1) : Obligatoire pour cherry-picker un commit de merge de PR
          git cherry-pick -m 1 ${{ inputs.commit_sha }} || (git cherry-pick --abort && echo "Conflit détecté, annulation." && exit 1)

          # On force le push au cas où le job est relancé
          git push origin $NEW_BRANCH --force

      - name: Création de la Pull Request
        env:
          # Utilise github.token ou ton secret PAT_CHERRY_PICK selon tes restrictions
          GH_TOKEN: ${{ secrets.PAT_CHERRY_PICK || github.token }} 
        run: |
          # On vérifie d'abord si la PR n'existe pas déjà (évite l'erreur en cas de re-run du job)
          PR_EXISTS=$(gh pr list --head "${{ steps.cp.outputs.branch_name }}" --base "${{ inputs.target_branch }}" --json url --jq '.[0].url')
          
          if [ -z "$PR_EXISTS" ]; then
            gh pr create \
              --base "${{ inputs.target_branch }}" \
              --head "${{ steps.cp.outputs.branch_name }}" \
              --title "🍒 Cherry-pick: commit ${{ inputs.commit_sha }} vers ${{ inputs.target_branch }}" \
              --body "Ce PR a été généré automatiquement suite au merge de la PR précédente sur la branche de prod."
          else
            echo "La Pull Request existe déjà et a été mise à jour par le push --force : $PR_EXISTS"
          fi