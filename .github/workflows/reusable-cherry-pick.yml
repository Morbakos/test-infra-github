name: Reusable Cherry Pick to PR

on:
  workflow_call:
    inputs:
      commit_sha:
        description: 'Le SHA du commit à cherry-picker'
        required: true
        type: string
      target_branch:
        description: 'La branche cible de la PR (ex: release/v1.0)'
        required: true
        type: string

jobs:
  cherry-pick-pr:
    runs-on: ubuntu-latest
    # Il est crucial de donner les droits d'écriture pour créer la branche et la PR
    permissions:
      contents: write
      pull-requests: write
      
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration de Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Création de la branche et Cherry-pick
        id: cp
        run: |
          # 1. Générer un nom de branche unique (ex: cherry-pick-abc1234-to-main)
          SHORT_SHA=$(echo "${{ inputs.commit_sha }}" | cut -c1-7)
          NEW_BRANCH="cherry-pick-${SHORT_SHA}-to-${{ inputs.target_branch }}"
          
          # Exposer le nom de la branche pour l'étape suivante
          echo "branch_name=$NEW_BRANCH" >> $GITHUB_OUTPUT

          # 2. Se placer sur la branche cible (base de la PR)
          git checkout ${{ inputs.target_branch }}

          # 3. Créer et basculer sur la nouvelle branche
          git checkout -b $NEW_BRANCH

          # 4. Tenter le cherry-pick
          git cherry-pick ${{ inputs.commit_sha }} || (git cherry-pick --abort && echo "Conflit détecté, annulation manuelle requise." && exit 1)

          # 5. Pousser la nouvelle branche
          git push origin $NEW_BRANCH

      - name: Création de la Pull Request
        env:
          # On utilise le CLI GitHub intégré aux runners, authentifié avec le token standard
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base "${{ inputs.target_branch }}" \
            --head "${{ steps.cp.outputs.branch_name }}" \
            --title "🍒 Cherry-pick: commit ${{ inputs.commit_sha }} vers ${{ inputs.target_branch }}" \
            --body "Ce PR a été généré automatiquement par GitHub Actions. Il contient le cherry-pick du commit \`${{ inputs.commit_sha }}\` vers la branche \`${{ inputs.target_branch }}\`."